# CARLA UE5 scalability groups.
#
# These bucket Unreal's `sg.*` CVars into Low (0) / Medium (1) / High (2) /
# Epic (3) tiers. The per-tier `sg.*Quality` selection is set at engine
# init by `CarlaDeviceProfileSelectorModule` (`StartupModule`,
# `LoadingPhase=PostConfigInit`) and re-applied on
# `FCoreDelegates::OnPostEngineInit` so the persisted GameUserSettings.ini
# state cannot shadow the active tier across runs.
#
# Target VRAM envelopes (Town10, 1-3 1080p RGB cameras):
#   Low    <=  6 GB
#   Medium <= 10 GB
#   High   <= 14 GB
#   Epic   unconstrained
#
# Only ECVF_Scalability CVars are valid in this file. Non-scalability CVars
# (r.DynamicGlobalIlluminationMethod, r.ReflectionMethod,
# r.Lumen.HardwareRayTracing, r.Shadow.Virtual.Enable, etc.) live in
# DefaultEngine.ini at the project level or are applied at engine init by
# `CarlaDeviceProfileSelectorModule` at `ECVF_SetByDeviceProfile`. None
# are dispatched at runtime via `GEngine->Exec()`, which previously
# triggered NVIDIA Xid 109 GR CTX SWITCH TIMEOUT on Blackwell + driver
# 590.48.
#
# UE reference:
# https://docs.unrealengine.com/5.5/en-US/scalability-reference-for-unreal-engine/

; ==========================================================================
; ViewDistanceQuality
; ==========================================================================
[ViewDistanceQuality@0]
r.SkeletalMeshLODBias=2
r.ViewDistanceScale=0.4

[ViewDistanceQuality@1]
r.SkeletalMeshLODBias=1
r.ViewDistanceScale=0.6

[ViewDistanceQuality@2]
r.SkeletalMeshLODBias=0
r.ViewDistanceScale=0.8

[ViewDistanceQuality@3]
r.SkeletalMeshLODBias=0
r.ViewDistanceScale=1.0

; ==========================================================================
; AntiAliasingQuality
; ==========================================================================
[AntiAliasingQuality@0]
r.FXAA.Quality=0
r.TemporalAA.Quality=0
r.TSR.History.UpdateQuality=0
r.TSR.RejectionAntiAliasingQuality=0

[AntiAliasingQuality@1]
r.FXAA.Quality=2
r.TemporalAA.Quality=1
r.TSR.History.UpdateQuality=1
r.TSR.RejectionAntiAliasingQuality=1

[AntiAliasingQuality@2]
r.FXAA.Quality=4
r.TemporalAA.Quality=2
r.TSR.History.UpdateQuality=2
r.TSR.RejectionAntiAliasingQuality=2

[AntiAliasingQuality@3]
r.FXAA.Quality=5
r.TemporalAA.Quality=3
r.TSR.History.UpdateQuality=3
r.TSR.RejectionAntiAliasingQuality=3

; ==========================================================================
; ShadowQuality
; r.Shadow.Virtual.Enable is not ECVF_Scalability; set at runtime instead.
; High (@2) and Epic (@3) intentionally let the engine defaults from
; BaseScalability.ini supply r.DistanceFieldShadowing (=1) and
; r.Shadow.Virtual.ResolutionLodBiasDirectional (=-0.5 / -1.5). Overriding
; those with coarser values in a previous revision made long-range
; shadows from palm trees / traffic-light structures pop in only a few
; metres from the ego. Low (@0) and Medium (@1) keep DF shadows off to
; stay within the tier VRAM envelope.
; ==========================================================================
[ShadowQuality@0]
r.LightFunctionQuality=0
r.ShadowQuality=0
r.Shadow.CSM.MaxCascades=1
r.Shadow.MaxResolution=512
r.Shadow.MaxCSMResolution=512
r.DistanceFieldShadowing=0
r.DistanceFieldAO=0

[ShadowQuality@1]
r.LightFunctionQuality=1
r.ShadowQuality=3
r.Shadow.CSM.MaxCascades=1
r.Shadow.MaxResolution=1024
r.Shadow.MaxCSMResolution=1024
r.Shadow.Virtual.ResolutionLodBiasDirectional=1.0
r.DistanceFieldShadowing=0
r.DistanceFieldAO=0

[ShadowQuality@2]
r.LightFunctionQuality=1
r.ShadowQuality=5
r.Shadow.CSM.MaxCascades=4
r.Shadow.MaxResolution=1024
r.Shadow.MaxCSMResolution=2048
r.DistanceFieldShadowing=1
r.DistanceFieldAO=0

[ShadowQuality@3]
r.LightFunctionQuality=1
r.ShadowQuality=5
r.Shadow.CSM.MaxCascades=10
r.Shadow.MaxResolution=2048
r.Shadow.MaxCSMResolution=4096
r.DistanceFieldShadowing=1
r.DistanceFieldAO=0

; ==========================================================================
; GlobalIlluminationQuality (Lumen)
; r.DynamicGlobalIlluminationMethod and r.Lumen.HardwareRayTracing are not
; ECVF_Scalability; the runtime Launch*QualityCommands set them directly.
; ==========================================================================
[GlobalIlluminationQuality@0]
r.Lumen.DiffuseIndirect.Allow=0

[GlobalIlluminationQuality@1]
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.TraceMeshSDFs.Allow=1
r.LumenScene.Radiosity.ProbeSpacing=8
r.Lumen.ScreenProbeGather.DownsampleFactor=32
r.Lumen.TranslucencyVolume.GridPixelSize=64

[GlobalIlluminationQuality@2]
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.TraceMeshSDFs.Allow=1
r.LumenScene.Radiosity.ProbeSpacing=4
r.Lumen.ScreenProbeGather.DownsampleFactor=16
r.Lumen.TranslucencyVolume.GridPixelSize=32

[GlobalIlluminationQuality@3]
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.TraceMeshSDFs.Allow=1
r.LumenScene.Radiosity.ProbeSpacing=4
r.Lumen.ScreenProbeGather.DownsampleFactor=16
r.Lumen.TranslucencyVolume.GridPixelSize=32

; ==========================================================================
; ReflectionQuality (Lumen reflections)
; r.ReflectionMethod is not ECVF_Scalability; set at runtime instead.
;
; Reflection-quality tuning:
;   RoughnessFadeLength 0.25 (default 0.1) widens the roughness band where
;   Lumen owns the reflection versus SSR, reducing SSR streaking on
;   semi-specular surfaces (car paint, wet asphalt).
;   MaxBounces 2 (default 1) enables a second recursive reflection ray; only
;   takes effect under HW-RT with Hit Lighting (Epic tier).
;   ScreenSpaceReconstruction 1 and SurfaceCacheFeedback 1 match UE5.5
;   defaults; recorded explicitly to lock the behavior.
; ==========================================================================
[ReflectionQuality@0]
r.Lumen.Reflections.Allow=0
r.SSR.Quality=0

[ReflectionQuality@1]
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.DownsampleFactor=2
r.Lumen.Reflections.MaxBounces=2
r.Lumen.Reflections.ScreenSpaceReconstruction=1
r.SSR.Quality=2

[ReflectionQuality@2]
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.DownsampleFactor=1
r.Lumen.Reflections.MaxBounces=2
r.Lumen.Reflections.RoughnessFadeLength=0.25
r.Lumen.Reflections.SurfaceCacheFeedback=1
r.SSR.Quality=3

[ReflectionQuality@3]
r.Lumen.Reflections.Allow=1
r.Lumen.Reflections.DownsampleFactor=1
r.Lumen.Reflections.MaxBounces=2
r.Lumen.Reflections.RoughnessFadeLength=0.25
r.Lumen.Reflections.SurfaceCacheFeedback=1
r.SSR.Quality=4

