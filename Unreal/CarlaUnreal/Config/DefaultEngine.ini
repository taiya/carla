[/Script/Engine.RendererSettings]
r.DefaultFeature.MotionBlur=True
r.VelocityOutputPass=True
r.AllowStaticLighting=True
r.DiscardUnusedQuality=True
r.DefaultFeature.Bloom=False
r.DefaultFeature.AmbientOcclusion=False
r.DefaultFeature.AmbientOcclusionStaticFraction=False
r.DefaultFeature.AutoExposure=False
; UE5 CARLA uses SetCustomPrimitiveDataVector4 for semantic tagging, not
; CustomDepth+Stencil. Value 1 keeps the CustomDepth pass opt-in for any
; user content that still needs it without allocating the full stencil
; target (saves ~40-80 MB at 1080p on the default cameras). The High and
; Epic tiers raise this to 3 (depth+stencil) at ECVF_SetByDeviceProfile
; from CarlaDeviceProfileSelectorModule.cpp; Low and Medium inherit the
; value 1 from this global.
r.CustomDepth=1
r.Streaming.PoolSize=4000
r.Streaming.LimitPoolSizeToVRAM=1
r.Vulkan.EnableDefragmentation=1
r.TextureStreaming=True
r.GenerateMeshDistanceFields=True
r.DistanceFieldBuild.EightBit=False
r.DistanceFieldBuild.Compress=False
; Mesh distance field atlas. Must stay at UE5.5 engine defaults (1024/2048):
; large Nanite meshes such as palm trees don't fit in a 512 XY atlas, which
; made their DistanceFieldShadowing shadows pop in only at short range on
; the High/Epic tiers. Lumen SDF tracing shares this atlas too.
r.DistanceFields.AtlasSizeXY=1024
r.DistanceFields.AtlasSizeZ=2048
r.DefaultFeature.AutoExposure.ExtendDefaultLuminanceRange=True
r.DefaultFeature.AntiAliasing=2
r.VirtualTextures=True
r.GPUSkin.Support16BitBoneIndex=True
r.GPUSkin.UnlimitedBoneInfluences=True
r.SkinCache.CompileShaders=True
SkeletalMesh.UseExperimentalChunking=1
r.Lumen.TraceMeshSDFs=1
r.ReflectionMethod=1
r.DynamicGlobalIlluminationMethod=1
; r.RayTracing is ECVF_ReadOnly: it can ONLY be set at engine init from this
; ini. Runtime `GEngine->Exec("r.RayTracing 1")` is a silent no-op, so the RT
; subsystem must be initialized True here for Epic tier HW-RT to work at all.
; Non-Epic tiers keep HW-RT effectively off via
; `r.RayTracing.ForceAllRayTracingEffects 0` (runtime-settable in their tier
; launch commands); Epic tier then flips the per-effect switches on. Users can
; still launch with `-execcmds="r.RayTracing.ForceAllRayTracingEffects 1"` to
; override without switching tiers.
r.RayTracing=True
r.Lumen.HardwareRayTracing=False
r.Lumen.HardwareRayTracing.LightingMode=3
r.Lumen.HardwareRayTracing.HitLighting.Skylight=1
; Bring reflection captures into HW-RT hit lighting and use VSM-resolution
; shadow samples inside reflections. Inert when r.Lumen.HardwareRayTracing
; is 0 (Low/Medium tiers), so safe to set globally.
r.Lumen.HardwareRayTracing.HitLighting.ReflectionCaptures=1
r.Lumen.HardwareRayTracing.HitLighting.ShadowMode=1
r.Lumen.TranslucencyReflections.FrontLayer.EnableForProject=True
r.RayTracing.Shadows=False
r.RayTracing.UseTextureLod=True
r.PathTracing=False
r.Shadow.Virtual.Enable=1
r.RayTracing.Shadows.AvoidSelfIntersectionTraceDistance=6
r.ReflectionCaptureResolution=256
; Skin cache pool. UE4-era default was 1024 MB to keep every vehicle + ped
; fully cached; UE5 manages residency far better, so 256 MB is plenty for
; the actor counts CARLA runs in practice and returns ~750 MB of VRAM.
r.SkinCache.SceneMemoryLimitInMB=256
r.CARLA.EnableSegmentationRendering=1

r.Lumen.ScreenProbeGather.ShortRangeAO.ScreenSpace.FoliageOcclusionStrength=0.0
r.Lumen.ScreenProbeGather.ShortRangeAO.ScreenSpace.SlopeCompareToleranceScale=0.5
r.Lumen.TraceDistanceScale=1.0

r.Shadow.Virtual.TranslucentQuality=1
